name: Feature request
description: Suggest a capability for z4j-bare
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for `z4j-bare`.

        `z4j-bare` is the framework-free agent runtime. It intentionally
        contains no framework-specific (Django / Flask / FastAPI) code
        and no engine-specific (Celery / RQ / Dramatiq / ...) code -
        those live in their own adapter packages. If your idea depends
        on a framework or engine, please file it there instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that z4j-bare does not currently support?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
